<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q2教练团队评分</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header .subtitle {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }
        
        .mode-switch {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 3px;
            margin: 12px auto 0;
            width: fit-content;
        }
        
        .mode-btn {
            padding: 6px 16px;
            border-radius: 18px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.8);
        }
        
        .mode-btn.active {
            background: white;
            color: #667eea;
        }
        
        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            background: #fafafa;
            color: #333;
            margin-bottom: 12px;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
            margin-top: 10px;
        }
        
        .btn-sm {
            padding: 10px 16px;
            font-size: 14px;
            width: auto;
        }
        
        /* 登录样式 */
        .admin-login {
            background: white;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .admin-login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .admin-login h3 {
            font-size: 18px;
            margin-bottom: 6px;
            color: #333;
        }
        
        .admin-login p {
            font-size: 13px;
            color: #999;
            margin-bottom: 20px;
        }
        
        .admin-login input {
            text-align: center;
            font-size: 18px;
            letter-spacing: 4px;
        }
        
        .admin-error {
            color: #f44336;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        
        .admin-error.show {
            display: block;
        }
        
        /* 教练列表 */
        .coach-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .coach-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .coach-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .coach-store {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-pending {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .status-done {
            background: #e8f5e9;
            color: #4caf50;
        }
        
        /* 评分项 */
        .eval-item {
            background: #fafafa;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }
        
        .eval-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .eval-desc {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .eval-score {
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        /* 选择按钮 */
        .choice-group {
            display: flex;
            gap: 10px;
        }
        
        .choice-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .choice-btn.selected-full {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #4caf50;
        }
        
        .choice-btn.selected-zero {
            border-color: #f44336;
            background: #ffebee;
            color: #f44336;
        }
        
        /* 原因输入 */
        .reason-input {
            margin-top: 10px;
            display: none;
        }
        
        .reason-input.show {
            display: block;
        }
        
        .reason-input textarea {
            background: white;
            min-height: 70px;
            resize: none;
            font-size: 14px;
        }
        
        .reason-label {
            font-size: 12px;
            color: #f44336;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .case-label {
            font-size: 12px;
            color: #4caf50;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .reason-required {
            color: #f44336;
            font-size: 11px;
            margin-top: 4px;
        }
        
        /* 总分 */
        .total-score {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            margin: 16px 0;
        }
        
        .total-score .label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .total-score .value {
            font-size: 36px;
            font-weight: 700;
            margin-top: 4px;
        }
        
        /* 新增教练 */
        .add-coach-section {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border: 2px dashed #ffc107;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .add-coach-title {
            font-size: 14px;
            font-weight: 600;
            color: #f57c00;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        /* 后台样式 */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            background: white;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        
        .store-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .store-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .store-item:last-child {
            border-bottom: none;
        }
        
        .store-item:active {
            background: #f5f5f5;
        }
        
        .store-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .store-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        
        .progress-bar {
            flex: 1;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 11px;
            color: #999;
            min-width: 45px;
            text-align: right;
        }
        
        .export-section {
            margin-top: 20px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .success-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 16px;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .detail-section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .detail-item {
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .detail-item:last-child {
            border-bottom: none;
        }
        
        .detail-name {
            font-size: 13px;
            color: #666;
        }
        
        .detail-value {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-top: 4px;
        }
        
        .coach-eval-list {
            margin-top: 12px;
        }
        
        .coach-eval-item {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .coach-eval-name {
            font-weight: 500;
            color: #333;
        }
        
        .coach-eval-score {
            float: right;
            font-weight: 600;
        }
        
        .coach-eval-reason {
            font-size: 12px;
            color: #f44336;
            margin-top: 4px;
            padding: 6px 8px;
            background: #ffebee;
            border-radius: 4px;
            word-break: break-all;
        }
        
        .coach-eval-case {
            font-size: 12px;
            color: #4caf50;
            margin-top: 4px;
            padding: 6px 8px;
            background: #e8f5e9;
            border-radius: 4px;
            word-break: break-all;
        }
        
        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f5f5f5;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-body {
            padding: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Q2教练团队评分</h1>
        <div class="subtitle">练二健身 · 2026年第二季度</div>
        <div class="mode-switch">
            <button class="mode-btn active" onclick="switchMode('shop')">店长评分</button>
            <button class="mode-btn" onclick="switchMode('admin')">总部后台</button>
        </div>
    </div>
    
    <div class="container">
        <!-- ==================== 店长端 ==================== -->
        <div id="shopSection">
            <div id="storeSelect" class="card">
                <div class="card-title">请选择您的门店</div>
                <select id="storeSelectEl">
                    <option value="">-- 请选择门店 --</option>
                </select>
                <button class="btn btn-primary" onclick="selectStore()">进入评分</button>
            </div>
            
            <div id="evalSection" class="hidden">
                <div class="card">
                    <div class="card-title">
                        当前门店：<span id="currentStore"></span>
                    </div>
                </div>
                
                <div id="coachList"></div>
                
                <div class="add-coach-section">
                    <div class="add-coach-title">
                        <span>➕</span> 门店有遗漏的教练？新增评分
                    </div>
                    <div class="form-row">
                        <input type="text" id="newCoachName" placeholder="教练花名 *" style="margin-bottom:0">
                        <input type="text" id="newCoachDate" placeholder="上架时间" style="margin-bottom:0" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
                    </div>
                    <button class="btn btn-secondary" onclick="addNewCoach()">添加并开始评分</button>
                </div>
                
                <button class="btn btn-primary" onclick="submitAllScores()">提交全部评分</button>
            </div>
        </div>
        
        <!-- ==================== 总部后台 ==================== -->
        <div id="adminSection" class="hidden">
            <!-- 登录页 -->
            <div id="adminLogin" class="admin-login">
                <div class="admin-login-icon">🔐</div>
                <h3>总部管理后台</h3>
                <p>请输入访问密码</p>
                <input type="password" id="adminPassword" placeholder="请输入密码" maxlength="20">
                <div id="adminError" class="admin-error">密码错误，请重新输入</div>
                <button class="btn btn-primary" onclick="verifyAdminPassword()">确认</button>
            </div>
            
            <!-- 后台内容 -->
            <div id="adminContent" class="hidden">
                <div class="admin-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalStores">0</div>
                        <div class="stat-label">门店总数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="completedStores">0</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalCoaches">0</div>
                        <div class="stat-label">教练总数</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">门店评分进度</div>
                    <div id="storeProgressList"></div>
                </div>
                
                <div class="export-section">
                    <button class="btn btn-primary" onclick="exportToExcel()">📥 导出Excel数据</button>
                    <button class="btn btn-secondary" onclick="clearAllData()">🗑 清空所有数据</button>
                    <button class="btn btn-secondary" onclick="logoutAdmin()" style="margin-top:10px">🔒 退出登录</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 教练评分弹窗 -->
    <div id="evalModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">评分：<span id="modalCoachName"></span></div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="evalItemsContainer"></div>
                
                <div class="total-score">
                    <div class="label">当前总分</div>
                    <div class="value"><span id="modalTotalScore">0</span> / 100</div>
                </div>
                
                <button class="btn btn-primary" onclick="saveEval()">💾 保存评分</button>
            </div>
        </div>
    </div>
    
    <!-- 门店详情弹窗 -->
    <div id="storeDetailModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="detailStoreName"></div>
                <button class="modal-close" onclick="closeDetailModal()">×</button>
            </div>
            <div class="modal-body" id="detailContent"></div>
        </div>
    </div>

            { name: '练二健身（裕隆大厦店）', city: '杭州', area: '一壹' },
            { name: '练二健身（望廷店）', city: '杭州', area: '堂堂' },
            { name: '练二健身（EFC店）', city: '杭州', area: '堂堂' },
            { name: '练二健身（紫金融里店）', city: '南京', area: '天浩' },
            { name: '练二健身（恒生科技店）', city: '杭州', area: '堂堂' },
            { name: '练二健身（归谷中心金牌店）', city: '杭州', area: '开新' },
            { name: '练二健身（苏体建邺科创园店）', city: '南京', area: '天浩' }
        ];
        
        const INITIAL_COACHES = {
            '练二健身Max（西溪八方城店）': [
                { name: '侃侃' }, { name: '安宇' }, { name: '阿樊' }, { name: '刚子' }, { name: '十一' }
            ],
            '练二健身（民企大厦店）': [{ name: '天天' }],
            '练二健身（EFC店）': [{ name: '妍妍' }],
            '练二健身（西投银泰店）': [{ name: '灼灼' }, { name: '光光' }, { name: '阿杰' }],
            '练二健身（中豪五星店）': [{ name: '立立' }, { name: '浩铮' }],
            '练二健身（未科新湖中心店）': [{ name: '尚麒' }],
            '练二健身（山水时代大厦店）': [{ name: '万万' }, { name: '旭豪' }],
            '练二健身（诺德财富中心店）': [{ name: '小羊' }, { name: '小猛' }, { name: '小黄' }, { name: '雯婕' }],
            '练二健身（黄龙万科店）': [{ name: '娜娜' }, { name: '阿龙' }],
            '练二健身（大剧院店）': [{ name: '栗栗' }],
            '练二健身（万象汇店）': [{ name: '友友' }, { name: '小泡泡' }],
            '练二健身（鲁商中心店）': [{ name: '小胖' }],
            '练二健身（河东吾悦店）': [{ name: '石头' }],
            '练二健身（国大城市广场店）': [{ name: '小吃' }],
            '练二健身（百花里店）': [{ name: '甜姐' }]
        };
        
        // ============ 状态 ============
        let currentStore = null;
        let currentCoach = null;
        let allData = {};
        let currentMode = 'shop';
        let adminLoggedIn = false;
        
        // ============ 初始化 ============
        function init() {
            loadData();
            populateStoreSelect();
        }
        
        function loadData() {
            const saved = localStorage.getItem('coachEvalData_v2');
            if (saved) {
                allData = JSON.parse(saved);
            } else {
                STORES.forEach(store => {
                    allData[store.name] = { coaches: [], submitted: false };
                });
            }
        }
        
        function saveData() {
            localStorage.setItem('coachEvalData_v2', JSON.stringify(allData));
        }
        
        function populateStoreSelect() {
            const select = document.getElementById('storeSelectEl');
            select.innerHTML = '<option value="">-- 请选择门店 --</option>';
            STORES.forEach(store => {
                const submitted = allData[store.name]?.submitted;
                const status = submitted ? ' ✓ 已提交' : '';
                select.innerHTML += `<option value="${store.name}">${store.city} · ${store.name}${status}</option>`;
            });
        }
        
        // ============ 模式切换 ============
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(mode === 'shop' ? '店长' : '总部'));
            });
            
            document.getElementById('shopSection').classList.toggle('hidden', mode !== 'shop');
            document.getElementById('adminSection').classList.toggle('hidden', mode !== 'admin');
            
            if (mode === 'admin') {
                if (adminLoggedIn) {
                    showAdminContent();
                } else {
                    showAdminLogin();
                }
            } else {
                populateStoreSelect();
            }
        }
        
        // ============ 总部后台登录 ============
        function showAdminLogin() {
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminContent').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminError').classList.remove('show');
        }
        
        function showAdminContent() {
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
            updateAdminStats();
        }
        
        function verifyAdminPassword() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                adminLoggedIn = true;
                showAdminContent();
            } else {
                document.getElementById('adminError').classList.add('show');
                document.getElementById('adminPassword').value = '';
            }
        }
        
        function logoutAdmin() {
            adminLoggedIn = false;
            showAdminLogin();
        }
        
        // 回车登录
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') verifyAdminPassword();
            });
        });
        
        // ============ 店长端 ============
        function selectStore() {
            const storeName = document.getElementById('storeSelectEl').value;
            if (!storeName) {
                alert('请选择门店');
                return;
            }
            
            currentStore = storeName;
            document.getElementById('storeSelect').classList.add('hidden');
            document.getElementById('evalSection').classList.remove('hidden');
            document.getElementById('currentStore').textContent = storeName;
            
            renderCoachList();
        }
        
        function renderCoachList() {
            const container = document.getElementById('coachList');
            const storeData = allData[currentStore];
            
            let coaches = [];
            if (INITIAL_COACHES[currentStore]) {
                INITIAL_COACHES[currentStore].forEach(c => {
                    coaches.push({ name: c.name, added: false });
                });
            }
            storeData.coaches.forEach(c => {
                if (!coaches.some(x => x.name === c.name)) {
                    coaches.push({ name: c.name, added: true, date: c.date });
                }
            });
            
            if (coaches.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <p>暂无教练数据</p>
                        <p style="font-size:12px;margin-top:8px">可使用下方"新增教练"功能添加</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = coaches.map(coach => {
                const evalData = storeData.coaches.find(c => c.name === coach.name);
                const isDone = evalData?.evaluated;
                const totalScore = evalData?.totalScore || 0;
                
                return `
                    <div class="coach-item" onclick="openEvalModal('${coach.name}')">
                        <div class="coach-header">
                            <div>
                                <div class="coach-name">${coach.name}${coach.added ? ' <span style="color:#f57c00;font-size:11px">+新增</span>' : ''}</div>
                                ${coach.date ? `<div class="coach-store">上架时间：${coach.date}</div>` : ''}
                            </div>
                            <span class="status-badge ${isDone ? 'status-done' : 'status-pending'}">
                                ${isDone ? '✓ 已评分' : '待评分'}
                                ${isDone ? ` (${totalScore}分)` : ''}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function addNewCoach() {
            const name = document.getElementById('newCoachName').value.trim();
            const date = document.getElementById('newCoachDate').value;
            
            if (!name) {
                alert('请输入教练花名');
                return;
            }
            
            const storeData = allData[currentStore];
            let exists = INITIAL_COACHES[currentStore]?.some(c => c.name === name);
            if (!exists) exists = storeData.coaches.some(c => c.name === name);
            
            if (exists) {
                alert('该教练已在列表中');
                return;
            }
            
            storeData.coaches.push({ name, date, evaluated: false });
            saveData();
            
            document.getElementById('newCoachName').value = '';
            document.getElementById('newCoachDate').value = '';
            
            renderCoachList();
            openEvalModal(name);
        }
        
        // ============ 评分弹窗 ============
        function openEvalModal(coachName) {
            currentCoach = coachName;
            document.getElementById('modalCoachName').textContent = coachName;
            
            const storeData = allData[currentStore];
            
            // 确保教练数据在coaches数组中
            let evalData = storeData.coaches.find(c => c.name === coachName);
            if (!evalData) {
                // 检查是否是初始教练
                const isInitial = INITIAL_COACHES[currentStore]?.some(c => c.name === coachName);
                evalData = { 
                    name: coachName, 
                    evaluated: false, 
                    items: {},
                    isInitial: isInitial || false
                };
                storeData.coaches.push(evalData);
            }
            
            const container = document.getElementById('evalItemsContainer');
            container.innerHTML = EVAL_ITEMS.map((item, idx) => {
                const data = evalData.items?.[idx] || { score: null, reason: '' };
                const hasReason = item.zeroReason || item.fullReason;
                const showReason = hasReason && data.score !== null && data.score !== undefined;
                const isZero = data.score === 0;
                const isFull = data.score === item.score;
                
                return `
                    <div class="eval-item">
                        <div class="eval-title">${idx + 1}. ${item.name}</div>
                        <div class="eval-desc">${item.desc}</div>
                        <div class="eval-score">满分 ${item.score} 分</div>
                        
                        <div class="choice-group">
                            <button class="choice-btn ${isFull ? 'selected-full' : ''}" 
                                   onclick="selectScore(${idx}, ${item.score})">
                                ✓ 满分
                            </button>
                            <button class="choice-btn ${isZero ? 'selected-zero' : ''}" 
                                   onclick="selectScore(${idx}, 0)">
                                ✗ 0分
                            </button>
                        </div>
                        
                        ${hasReason ? `
                            <div class="reason-input ${showReason ? 'show' : ''}" id="reason-${idx}">
                                ${item.zeroReason && isZero ? `
                                    <div class="reason-label">⚠️ 请填写0分原因（必填）</div>
                                    <textarea id="reason-text-${idx}" placeholder="请输入扣分原因...">${data.reason || ''}</textarea>
                                    <div class="reason-required" id="reason-error-${idx}">请填写0分原因</div>
                                ` : ''}
                                ${item.fullReason && isFull ? `
                                    <div class="case-label">📝 请填写满分案例（必填）</div>
                                    <textarea id="reason-text-${idx}" placeholder="请输入满分获得的具体案例...">${data.reason || ''}</textarea>
                                    <div class="reason-required" id="reason-error-${idx}">请填写满分案例</div>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            updateModalTotal();
            document.getElementById('evalModal').classList.remove('hidden');
        }
        
        function selectScore(idx, score) {
            const item = EVAL_ITEMS[idx];
            const storeData = allData[currentStore];
            let evalData = storeData.coaches.find(c => c.name === currentCoach);
            
            if (!evalData) {
                const isInitial = INITIAL_COACHES[currentStore]?.some(c => c.name === currentCoach);
                evalData = { 
                    name: currentCoach, 
                    evaluated: false, 
                    items: {},
                    isInitial: isInitial || false
                };
                storeData.coaches.push(evalData);
            }
            
            evalData.items[idx] = { score, reason: evalData.items[idx]?.reason || '' };
            evalData.evaluated = true;
            
            // 更新按钮状态
            const itemContainer = document.getElementById('evalItemsContainer').children[idx];
            const btns = itemContainer.querySelectorAll('.choice-btn');
            btns.forEach(btn => {
                btn.classList.remove('selected-full', 'selected-zero');
            });
            
            if (score === item.score) {
                btns[0].classList.add('selected-full');
            } else {
                btns[1].classList.add('selected-zero');
            }
            
            // 更新原因输入区
            const reasonDiv = document.getElementById(`reason-${idx}`);
            if (item.zeroReason || item.fullReason) {
                if (score === 0 && item.zeroReason) {
                    reasonDiv.classList.add('show');
                    reasonDiv.innerHTML = `
                        <div class="reason-label">⚠️ 请填写0分原因（必填）</div>
                        <textarea id="reason-text-${idx}" placeholder="请输入扣分原因..."></textarea>
                        <div class="reason-required" id="reason-error-${idx}">请填写0分原因</div>
                    `;
                } else if (score === item.score && item.fullReason) {
                    reasonDiv.classList.add('show');
                    reasonDiv.innerHTML = `
                        <div class="case-label">📝 请填写满分案例（必填）</div>
                        <textarea id="reason-text-${idx}" placeholder="请输入满分获得的具体案例..."></textarea>
                        <div class="reason-required" id="reason-error-${idx}">请填写满分案例</div>
                    `;
                } else {
                    reasonDiv.classList.remove('show');
                }
            }
            
            saveData();
            updateModalTotal();
        }
        
        function updateModalTotal() {
            const storeData = allData[currentStore];
            const evalData = storeData.coaches.find(c => c.name === currentCoach);
            if (!evalData) return;
            
            let total = 0;
            EVAL_ITEMS.forEach((item, idx) => {
                if (evalData.items[idx]?.score !== null && evalData.items[idx]?.score !== undefined) {
                    total += evalData.items[idx].score;
                }
            });
            
            document.getElementById('modalTotalScore').textContent = total;
        }
        
        function saveEval() {
            const storeData = allData[currentStore];
            const evalData = storeData.coaches.find(c => c.name === currentCoach);
            if (!evalData) return;
            
            // 检查所有项是否已评分
            let allScored = true;
            let missingReason = [];
            
            EVAL_ITEMS.forEach((item, idx) => {
                if (evalData.items[idx]?.score === null || evalData.items[idx]?.score === undefined) {
                    allScored = false;
                }
                
                // 检查原因是否填写
                const reasonEl = document.getElementById(`reason-text-${idx}`);
                const errorEl = document.getElementById(`reason-error-${idx}`);
                
                if (reasonEl) {
                    const reasonText = reasonEl.value.trim();
                    evalData.items[idx].reason = reasonText;
                    
                    if (reasonText === '') {
                        const needReason = (evalData.items[idx].score === 0 && item.zeroReason) ||
                                          (evalData.items[idx].score === item.score && item.fullReason);
                        if (needReason) {
                            missingReason.push(item.name);
                            if (errorEl) errorEl.style.display = 'block';
                        }
                    } else {
                        if (errorEl) errorEl.style.display = 'none';
                    }
                }
            });
            
            if (!allScored) {
                alert('请完成所有评分项');
                return;
            }
            
            if (missingReason.length > 0) {
                alert(`以下评分项需要填写原因：\n${missingReason.join('、')}`);
                return;
            }
            
            // 计算总分
            let total = 0;
            EVAL_ITEMS.forEach((item, idx) => {
                total += evalData.items[idx].score || 0;
            });
            
            evalData.totalScore = total;
            evalData.evaluated = true;
            evalData.saveTime = new Date().toISOString();
            saveData();
            
            closeModal();
            renderCoachList();
            showToast('评分已保存 ✓');
        }
        
        function closeModal() {
            document.getElementById('evalModal').classList.add('hidden');
        }
        
        function submitAllScores() {
            if (!currentStore) return;
            
            const storeData = allData[currentStore];
            let coaches = [];
            
            if (INITIAL_COACHES[currentStore]) {
                coaches = coaches.concat(INITIAL_COACHES[currentStore].map(c => c.name));
            }
            storeData.coaches.forEach(c => {
                if (!coaches.includes(c.name)) coaches.push(c.name);
            });
            
            const unScored = coaches.filter(name => {
                const evalData = storeData.coaches.find(c => c.name === name);
                return !evalData?.evaluated;
            });
            
            if (unScored.length > 0) {
                alert(`还有 ${unScored.length} 位教练未评分：\n${unScored.join('、')}`);
                return;
            }
            
            if (!confirm('确认提交全部评分？提交后不可修改。')) return;
            
            storeData.submitted = true;
            storeData.submitTime = new Date().toISOString();
            saveData();
            
            showToast('提交成功 ✓');
            switchMode('shop');
        }
        
        // ============ 总部后台 ============
        function updateAdminStats() {
            let totalStores = STORES.length;
            let completedStores = 0;
            let totalCoaches = 0;
            
            STORES.forEach(store => {
                if (allData[store.name]?.submitted) completedStores++;
                
                const names = new Set();
                if (INITIAL_COACHES[store.name]) {
                    INITIAL_COACHES[store.name].forEach(c => names.add(c.name));
                }
                allData[store.name]?.coaches?.forEach(c => names.add(c.name));
                totalCoaches += names.size;
            });
            
            document.getElementById('totalStores').textContent = totalStores;
            document.getElementById('completedStores').textContent = completedStores;
            document.getElementById('totalCoaches').textContent = totalCoaches;
            
            renderStoreProgress();
        }
        
        function renderStoreProgress() {
            const container = document.getElementById('storeProgressList');
            
            container.innerHTML = STORES.map(store => {
                const data = allData[store.name];
                
                let totalCoaches = 0;
                let scoredCoaches = 0;
                
                const names = new Set();
                if (INITIAL_COACHES[store.name]) {
                    INITIAL_COACHES[store.name].forEach(c => names.add(c.name));
                }
                data?.coaches?.forEach(c => names.add(c.name));
                totalCoaches = names.size;
                
                if (data?.submitted) {
                    scoredCoaches = totalCoaches;
                } else {
                    data?.coaches?.forEach(c => {
                        if (c.evaluated) scoredCoaches++;
                    });
                }
                
                const percent = totalCoaches > 0 ? Math.round((scoredCoaches / totalCoaches) * 100) : 0;
                const status = data?.submitted ? '已完成' : `${scoredCoaches}/${totalCoaches}`;
                
                return `
                    <div class="store-item" onclick="showStoreDetail('${store.name}')">
                        <div class="store-name">${store.city} · ${store.name}</div>
                        <div class="store-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                            <span class="progress-text">${status}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function showStoreDetail(storeName) {
            document.getElementById('detailStoreName').textContent = storeName;
            
            const data = allData[storeName];
            const coaches = new Map();
            
            if (INITIAL_COACHES[storeName]) {
                INITIAL_COACHES[storeName].forEach(c => {
                    coaches.set(c.name, { name: c.name, added: false });
                });
            }
            data?.coaches?.forEach(c => {
                coaches.set(c.name, { name: c.name, added: true, date: c.date });
            });
            
            let html = '';
            
            if (coaches.size === 0) {
                html = '<div class="empty-state">暂无教练数据</div>';
            } else {
                coaches.forEach((coach, name) => {
                    const evalData = data?.coaches?.find(c => c.name === name);
                    const totalScore = evalData?.totalScore || 0;
                    const evaluated = evalData?.evaluated;
                    
                    html += `
                        <div class="detail-section" style="margin-top:${html ? '12px' : '0'}">
                            <div class="detail-item">
                                <div class="coach-name" style="font-weight:600">
                                    ${coach.name}
                                    ${coach.added ? '<span style="color:#f57c00;font-size:11px;margin-left:6px">+新增</span>' : ''}
                                    <span style="float:right;color:${evaluated ? '#4caf50' : '#f44336'}">${evaluated ? totalScore + '分' : '未评分'}</span>
                                </div>
                            </div>
                            ${evaluated ? `
                                <div class="coach-eval-list">
                                    ${EVAL_ITEMS.map((item, idx) => {
                                        const itemData = evalData.items?.[idx];
                                        const score = itemData?.score ?? '-';
                                        const reason = itemData?.reason;
                                        
                                        return `
                                            <div class="coach-eval-item">
                                                <span class="coach-eval-name">${item.name}</span>
                                                <span class="coach-eval-score" style="color:${score === item.score ? '#4caf50' : '#f44336'}">${score}分</span>
                                                ${reason ? `
                                                    <div class="${score === 0 ? 'coach-eval-reason' : 'coach-eval-case'}">
                                                        ${score === 0 ? '原因：' : '案例：'}${reason}
                                                    </div>
                                                ` : ''}
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            ` : '<div style="color:#999;font-size:12px;padding:8px 0">待评分</div>'}
                        </div>
                    `;
                });
            }
            
            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('storeDetailModal').classList.remove('hidden');
        }
        
        function closeDetailModal() {
            document.getElementById('storeDetailModal').classList.add('hidden');
        }
        
        // ============ 导出 ============
        function exportToExcel() {
            let csv = '\uFEFF';
            
            csv += '城市,门店,教练花名,是否新增,上架时间,';
            EVAL_ITEMS.forEach((item, idx) => {
                csv += `${item.name}(${item.score}分),${item.name}备注,`;
            });
            csv += '总分,提交状态,提交时间\n';
            
            STORES.forEach(store => {
                const data = allData[store.name];
                const coaches = new Map();
                
                if (INITIAL_COACHES[store.name]) {
                    INITIAL_COACHES[store.name].forEach(c => {
                        coaches.set(c.name, { name: c.name, added: '否' });
                    });
                }
                data?.coaches?.forEach(c => {
                    coaches.set(c.name, { name: c.name, added: '是', date: c.date });
                });
                
                coaches.forEach((coach, name) => {
                    const evalData = data?.coaches?.find(c => c.name === name);
                    
                    csv += `"${store.city}","${store.name}","${coach.name}","${coach.added}","${coach.date || ''}",`;
                    
                    let totalScore = 0;
                    EVAL_ITEMS.forEach((item, idx) => {
                        const itemData = evalData?.items?.[idx];
                        const score = itemData?.score ?? '';
                        const reason = itemData?.reason || '';
                        csv += `"${score}","${reason.replace(/"/g, '""')}",`;
                        if (score !== '' && !isNaN(score)) {
                            totalScore += parseInt(score);
                        }
                    });
                    
                    csv += `${totalScore},"${data?.submitted ? '已提交' : '未提交'}","${data?.submitTime || ''}"\n`;
                });
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Q2教练评分_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('导出成功 ✓');
        }
        
        function clearAllData() {
            if (!confirm('确认清空所有数据？此操作不可恢复！')) return;
            if (!confirm('再次确认：清空后所有评分数据将丢失！')) return;
            
            localStorage.removeItem('coachEvalData_v2');
            allData = {};
            STORES.forEach(store => {
                allData[store.name] = { coaches: [], submitted: false };
            });
            saveData();
            updateAdminStats();
            showToast('已清空所有数据');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'success-toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
